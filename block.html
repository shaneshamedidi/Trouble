<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禁止觀看</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* 影片背景 */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    object-fit: cover;
    z-index: -1;
}

/* 內容 */
.content {
    position: relative;
    z-index: 1;
    margin-top: 20vh;
}

h1 {
    font-size: 28px;
}

p {
    color: #ccc;
}

/* 提示 */
.tip {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body onclick="startVideo()">

<!-- 🎬 影片 -->
<video id="bgVideo" muted loop playsinline webkit-playsinline>
    <source src="no.mp4" type="video/mp4">
</video>

<div class="content">
    <h1>⚠️ 請勿觀看此內容</h1>
    <p>你未滿18歲，無法進入本站內容。</p>
    <div class="tip">點擊畫面開始播放</div>
</div>

<script>
function startVideo() {
    const video = document.getElementById("bgVideo");
    video.play();
}
</script>

</body>
</html>
