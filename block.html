<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禁止觀看</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🎞 GIF 背景 */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-image: url("warning.gif"); /* 👈 你的 GIF */
    background-size: cover;
    background-position: center;
}

/* 🌑 黑色遮罩（讓文字清楚） */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.55);
}

/* 📦 文字內容 */
.content {
    position: relative;
    text-align: center;
    top: 35vh;
    padding: 20px;
}

h1 {
    font-size: 28px;
}

p {
    color: #ccc;
    font-size: 16px;
}

/* ✨ 閃爍提示 */
.tip {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.6;
    animation: blink 1.2s infinite;
}

@keyframes blink {
    50% { opacity: 0.2; }
}
</style>
</head>

<body>

<!-- 🎞 GIF 背景 -->
<div class="bg"></div>

<!-- 🌑 遮罩 -->
<div class="overlay"></div>

<!-- ⚠️ 文字 -->
<div class="content">
    <h1>⚠️ 請勿觀看此內容</h1>
    <p>你未滿18歲，無法進入本站內容。</p>
    <div class="tip">系統已限制存取</div>
</div>

</body>
</html>
