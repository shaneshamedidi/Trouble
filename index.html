<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首頁</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      background-image: url("image.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      min-height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    nav {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 25px;
      border-radius: 16px;
      width: 80%;
      max-width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    nav a {
      display: block;
      color: white;
      text-decoration: none;
      font-size: 18px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.1);
      transition: 0.3s;
    }

    nav a:hover {
      background-color: rgba(0, 217, 255, 0.3);
      transform: scale(1.03);
    }

    @media (max-width: 600px) {
      nav {
        width: 90%;
        padding: 20px;
      }

      nav a {
        font-size: 16px;
        padding: 14px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <h1>她真的很麻煩</h1>

  <nav>
    <a href="check.html">第二十二章</a>
    <a href="Trouble23.html">第二十三章</a>
  </nav>

</body>
</html>
