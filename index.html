<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>年齡確認</title>
    <style>
        /* 🖼️ 封面圖片 */
        .cover {
            width: 450px;        /* 👈 原本300 → 放大 */
            max-width: 90%;
            display: block;
            margin: 30px auto;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        /* 🧠 標題變大 */
        h1 {
            font-size: 36px;     /* 👈 放大標題 */
            margin-bottom: 20px;
        }
        
        /* 🔘 按鈕變大 */
        button {
            padding: 14px 28px;  /* 👈 按鈕變大 */
            font-size: 18px;     /* 👈 字變大 */
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
    
</head>
<body>

    <h1>你成年了嗎?</h1>

    <!-- 👇 新增圖片 -->
    <img src="confuse.jpg" alt="封面圖片" class="cover">
    
    <button onclick="enterAdult()">我已成年</button>
    <button onclick="notAdult()">未滿18歲</button>

    <script>
        function enterAdult() {
            window.location.href = "home.html";
        }

        function notAdult() {
            window.location.href = "block.html";
        }
    </script>

</body>
</html>
