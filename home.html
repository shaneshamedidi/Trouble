<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一篇：相遇</title>

    <style>
        /* 背景圖片 */
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background-image: url("S_43393073.jpg");/* 👈 換成你的圖片 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            color: #333;
        }

        /* 黑色透明遮罩（讓文字更清楚） */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 👈 透明度調整 */
            z-index: 0;
        }

        /* 文章容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.92); /* 👈 半透明白色 */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-line;
        }

        .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: #555;
            transition: 0.2s;
        }

        a:hover {
            color: black;
        }

        .btn {
            padding: 6px 12px;
            background: #333;
            color: white;
            border-radius: 8px;
        }

        .btn:hover {
            background: #000;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="top">
            <a href="home.html">← 回首頁</a>
            <a class="btn" href="home.html">首頁</a>
        </div>

        <h1>第一篇：相遇</h1>

        <p>
這裡寫你的文章內容……

背景已經加上圖片 + 透明遮罩 + 白色閱讀框
會變得很像小說網站
        </p>

    </div>

</body>
</html>
