<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouble</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
        
            display: flex;
            justify-content: center;  
            align-items: center;      
        
            flex-direction: column;   
            text-align: center;
        
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #111, #333);
            color: white;
        }
        h1 {
            font-size: 48px;   
            margin-bottom: 20px;
        }
        .cover {
            width: 600px;
            max-width: 90%;
        
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        
            margin-bottom: 30px;
        }
        button {
            padding: 16px 32px;
            font-size: 20px;
        
            margin: 10px;
            border-radius: 12px;
        
            cursor: pointer;
            border: none;
        
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        
        button:first-of-type {
            background: #4CAF50;
            color: white;
        }
        
        button:last-of-type {
            background: #e74c3c;
            color: white;
        }
        .btn-group {
            display: flex;
            flex-direction: row; 
            gap: 20px;            
            margin-top: 10px;
        } 
    </style>
</head>
    
<body>

    <h1>你確定？</h1>

    <img src="confuse2.jpg" alt="封面圖片" class="cover">

    <div class="btn-group">
        <button onclick="enterAdult()">我確定我成年</button>
        <button onclick="notAdult()">被發現沒成年了</button>
    </div>
<script>
if (sessionStorage.getItem("allowed") !== "true") {
    window.location.href = "index.html";
}
function enterAdult() {
    window.location.href = "Trouble22.html";
}

function notAdult() {
    window.location.href = "block.html";
}
</script>

</body>
</html>
