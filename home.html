<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一篇：相遇</title>

    <style>
        body {
            margin: 0;
            font-family: "Helvetica", "Arial", sans-serif;
            background: #f4f4f6;
            color: #333;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        p {
            font-size: 18px;
            white-space: pre-line;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: 0.2s;
        }

        .back:hover {
            color: #000;
        }

        /* 回首頁按鈕 */
        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            background: #333;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #000;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">
            <a class="back" href="home.html">← 返回首頁</a>
            <a class="btn" href="home.html">回首頁</a>
        </div>

        <h1>第一篇：相遇</h1>

        <p>
這裡寫你的文章內容……

你可以直接在這裡自由換行。
也可以寫很長的段落，排版會自動幫你整理好。

閱讀起來會像小說網站一樣舒服。
        </p>

    </div>

</body>
</html>
